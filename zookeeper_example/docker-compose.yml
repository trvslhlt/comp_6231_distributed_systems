services:
  zoo1:
    image: zookeeper:3.9
    hostname: zoo1
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
      ZOO_DATA_DIR: /logs
    volumes:
      - ./logs/zoo1:/logs
    networks:
      - zknet

  zoo2:
    image: zookeeper:3.9
    hostname: zoo2
    ports:
      - "2182:2181"
    environment:
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
      ZOO_DATA_DIR: /logs
    volumes:
      - ./logs/zoo2:/logs
    networks:
      - zknet

  zoo3:
    image: zookeeper:3.9
    hostname: zoo3
    ports:
      - "2183:2181"
    environment:
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
      ZOO_DATA_DIR: /logs
    volumes:
      - ./logs/zoo3:/logs
    networks:
      - zknet

  # Interactive client — shell in with: docker compose run --rm zkclient
  zkclient:
    image: zookeeper:3.9
    entrypoint: ["bin/zkCli.sh", "-server", "zoo1:2181,zoo2:2181,zoo3:2181"]
    depends_on:
      - zoo1
      - zoo2
      - zoo3
    networks:
      - zknet

networks:
  zknet:
    driver: bridge
