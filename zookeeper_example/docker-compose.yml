x-zoo-servers: &zoo-servers "server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181"

x-zoo-env: &zoo-env
  ZOO_SERVERS: *zoo-servers
  ZOO_DATA_DIR: /logs

x-zoo-base: &zoo-base
  image: zookeeper:3.9
  networks:
    - zknet

services:
  zoo1:
    <<: *zoo-base
    hostname: zoo1
    ports:
      - "2181:2181"
    environment:
      <<: *zoo-env
      ZOO_MY_ID: 1
    volumes:
      - ./logs/zoo1:/logs

  zoo2:
    <<: *zoo-base
    hostname: zoo2
    ports:
      - "2182:2181"
    environment:
      <<: *zoo-env
      ZOO_MY_ID: 2
    volumes:
      - ./logs/zoo2:/logs

  zoo3:
    <<: *zoo-base
    hostname: zoo3
    ports:
      - "2183:2181"
    environment:
      <<: *zoo-env
      ZOO_MY_ID: 3
    volumes:
      - ./logs/zoo3:/logs

  # Interactive client — shell in with: docker compose run --rm zkclient
  zkclient:
    image: zookeeper:3.9
    entrypoint: ["bin/zkCli.sh", "-server", "zoo1:2181,zoo2:2181,zoo3:2181"]
    depends_on:
      - zoo1
      - zoo2
      - zoo3
    networks:
      - zknet

networks:
  zknet:
    driver: bridge
